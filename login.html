<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Blobs de fundo -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute bottom-[-8%] right-[-8%] w-[480px] h-[480px] bg-[#00BFA5]/8 rounded-full blur-[120px]"></div>
        <div class="absolute top-[-10%] left-[-10%] w-[400px] h-[400px] bg-[#003d33]/50 rounded-full blur-[100px]"></div>
    </div>

    <main class="w-full max-w-[400px] mx-4 z-10">
        <!-- Card -->
        <div class="glass rounded-2xl p-8 md:p-10">

            <!-- Logo + tagline -->
            <div class="text-center mb-9">
                <a href="login.html" class="logo text-[1.6rem]">Sa<span>ge</span></a>
                <p class="text-zinc-500 text-[10px] font-light tracking-[0.22em] uppercase mt-2">Domínio Técnico &amp; Excelência</p>
            </div>

            <!-- Mensagem de erro -->
            <div id="login-error" class="hidden alert alert-error mb-5"></div>

            <form id="login-form" class="space-y-4" novalidate>
                <!-- Email -->
                <div class="space-y-1.5">
                    <label for="email" class="text-[11px] font-medium text-zinc-400 tracking-wide">E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        </div>
                        <input type="email" id="email" autocomplete="email"
                            class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/8 rounded-xl text-sm text-white placeholder-zinc-600 font-light focus:outline-none focus:ring-1 focus:ring-[#00BFA5] focus:border-[#00BFA5] transition-all"
                            placeholder="seu@email.com" required>
                    </div>
                </div>

                <!-- Senha -->
                <div class="space-y-1.5">
                    <div class="flex justify-between items-center">
                        <label for="password" class="text-[11px] font-medium text-zinc-400 tracking-wide">Senha</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <input type="password" id="password" autocomplete="current-password"
                            class="block w-full pl-10 pr-10 py-2.5 bg-white/5 border border-white/8 rounded-xl text-sm text-white placeholder-zinc-600 font-light focus:outline-none focus:ring-1 focus:ring-[#00BFA5] focus:border-[#00BFA5] transition-all"
                            placeholder="••••••••" required>
                        <!-- Toggle visibilidade -->
                        <button type="button" id="toggle-pw" tabindex="-1"
                            class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-zinc-600 hover:text-zinc-300 transition-colors">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="login-btn"
                    class="w-full mt-2 py-2.5 bg-[#00BFA5] hover:bg-[#00d4b8] text-black text-sm font-medium rounded-full transition-all hover:shadow-[0_0_24px_rgba(0,191,165,0.4)] active:scale-[0.98]">
                    Entrar
                </button>
            </form>

            <p class="mt-7 text-center text-xs text-zinc-500 font-light">
                Não tem acesso?
                <a href="register.html" class="text-[#00BFA5] hover:text-[#00d4b8] transition-colors ml-1">Solicitar cadastro</a>
            </p>
        </div>
    </main>

    <script>
        const API_URL = '/api';

        // Toggle senha visível
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            errorEl.classList.add('hidden');

            if (!email || !password) {
                errorEl.textContent = 'Preencha e-mail e senha.';
                errorEl.className = 'alert alert-error mb-5';
                return;
            }

            btn.textContent = 'Autenticando...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('sage_auth', JSON.stringify({
                        email: result.user.email,
                        name: result.user.name,
                        role: result.user.role,
                        token: result.token,
                        timestamp: Date.now()
                    }));
                    window.location.href = 'index.html';
                } else {
                    errorEl.textContent = result.error || 'Credenciais inválidas.';
                    errorEl.className = 'alert alert-error mb-5';
                    btn.textContent = 'Entrar';
                    btn.disabled = false;
                }
            } catch (_) {
                errorEl.textContent = 'Não foi possível conectar ao servidor.';
                errorEl.className = 'alert alert-error mb-5';
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
