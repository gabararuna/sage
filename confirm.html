<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage | Conta criada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Blobs de fundo -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-[#00BFA5]/5 rounded-full blur-[130px]"></div>
    </div>

    <main class="w-full max-w-[400px] mx-4 z-10">
        <div class="glass rounded-2xl p-8 md:p-10 text-center animate-in">

            <!-- Ícone de sucesso -->
            <div class="w-16 h-16 bg-[#00BFA5]/10 border border-[#00BFA5]/20 rounded-full flex items-center justify-center mx-auto mb-7">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00BFA5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
            </div>

            <h1 class="text-2xl font-light tracking-tight text-white mb-3">
                Conta criada com sucesso
            </h1>

            <p class="text-zinc-400 text-sm font-light leading-relaxed mb-8 max-w-xs mx-auto">
                O novo usuário já pode acessar a plataforma com as credenciais cadastradas.
            </p>

            <div class="space-y-3">
                <a href="index.html" class="primary-btn w-full justify-center mx-auto inline-flex">
                    Ir para o Catálogo
                </a>
                <a href="register.html" class="block text-xs text-zinc-600 hover:text-zinc-400 transition-colors mt-2">
                    Cadastrar outro usuário
                </a>
            </div>

        </div>
    </main>

</body>

</html>
