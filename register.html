<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage | Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Blobs de fundo -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute bottom-[-8%] right-[-8%] w-[480px] h-[480px] bg-[#00BFA5]/6 rounded-full blur-[120px]"></div>
        <div class="absolute top-[-10%] left-[-10%] w-[400px] h-[400px] bg-[#003d33]/40 rounded-full blur-[100px]"></div>
    </div>

    <main class="w-full max-w-[420px] mx-4 z-10">
        <div class="glass rounded-2xl p-8 md:p-10">

            <!-- Logo -->
            <div class="text-center mb-9">
                <a href="login.html" class="logo text-[1.6rem]">Sa<span>ge</span></a>
                <p class="text-zinc-500 text-[10px] font-light tracking-[0.22em] uppercase mt-2">Cadastro de Usuário</p>
            </div>

            <!-- Estado: sem permissão (exibido se não for admin) -->
            <div id="no-access-view">
                <div class="text-center py-4">
                    <div class="w-14 h-14 bg-white/5 border border-white/10 rounded-full flex items-center justify-center mx-auto mb-5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <h2 class="text-lg font-light tracking-tight text-white mb-2">Acesso restrito</h2>
                    <p class="text-zinc-500 text-sm font-light leading-relaxed max-w-xs mx-auto">
                        O cadastro de novos usuários requer permissão de administrador.
                        Entre em contato com o responsável pela plataforma.
                    </p>
                    <a href="login.html" class="primary-btn mx-auto inline-flex mt-6">
                        Ir para o Login
                    </a>
                </div>
            </div>

            <!-- Estado: formulário admin (exibido apenas para admins logados) -->
            <div id="admin-register-view" class="hidden">
                <div id="register-alert" class="hidden mb-5"></div>

                <form id="register-form" class="space-y-4" novalidate>
                    <!-- Nome -->
                    <div class="space-y-1.5">
                        <label for="name" class="text-[11px] font-medium text-zinc-400 tracking-wide">Nome completo</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
                            </div>
                            <input type="text" id="name" autocomplete="name"
                                class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/8 rounded-xl text-sm text-white placeholder-zinc-600 font-light focus:outline-none focus:ring-1 focus:ring-[#00BFA5] focus:border-[#00BFA5] transition-all"
                                placeholder="Nome Completo" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="space-y-1.5">
                        <label for="email" class="text-[11px] font-medium text-zinc-400 tracking-wide">E-mail</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                            </div>
                            <input type="email" id="email" autocomplete="off"
                                class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/8 rounded-xl text-sm text-white placeholder-zinc-600 font-light focus:outline-none focus:ring-1 focus:ring-[#00BFA5] focus:border-[#00BFA5] transition-all"
                                placeholder="usuario@email.com" required>
                        </div>
                    </div>

                    <!-- Senha -->
                    <div class="space-y-1.5">
                        <label for="password" class="text-[11px] font-medium text-zinc-400 tracking-wide">Senha</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </div>
                            <input type="password" id="password" autocomplete="new-password"
                                class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/8 rounded-xl text-sm text-white placeholder-zinc-600 font-light focus:outline-none focus:ring-1 focus:ring-[#00BFA5] focus:border-[#00BFA5] transition-all"
                                placeholder="Senha segura" required minlength="6">
                        </div>
                    </div>

                    <!-- Papel -->
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-medium text-zinc-400 tracking-wide">Nível de acesso</label>
                        <select id="role"
                            class="w-full bg-white/5 border border-white/8 rounded-xl px-4 py-2.5 text-sm text-white font-light focus:outline-none focus:ring-1 focus:ring-[#00BFA5] focus:border-[#00BFA5] transition-all appearance-none">
                            <option value="user" class="bg-zinc-900">Usuário</option>
                            <option value="admin" class="bg-zinc-900">Administrador</option>
                        </select>
                    </div>

                    <button type="submit" id="register-btn"
                        class="w-full mt-1 py-2.5 bg-[#00BFA5] hover:bg-[#00d4b8] text-black text-sm font-medium rounded-full transition-all hover:shadow-[0_0_24px_rgba(0,191,165,0.4)] active:scale-[0.98]">
                        Criar Conta
                    </button>
                </form>
            </div>

        </div>

        <p class="text-center text-xs text-zinc-600 mt-5 font-light">
            <a href="login.html" class="hover:text-zinc-400 transition-colors">← Voltar para o Login</a>
        </p>
    </main>

    <script>
        const API_URL = 'http://localhost:3001/api';

        // Verifica se é admin logado
        const auth = JSON.parse(localStorage.getItem('sage_auth') || '{}');
        const isAdmin = auth.role === 'admin' && auth.token;

        if (isAdmin) {
            document.getElementById('no-access-view').classList.add('hidden');
            document.getElementById('admin-register-view').classList.remove('hidden');
        }

        const form = document.getElementById('register-form');
        if (form) {
            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const alertEl = document.getElementById('register-alert');
                const btn = document.getElementById('register-btn');
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const role = document.getElementById('role').value;

                alertEl.classList.add('hidden');

                if (!name || !email || !password) {
                    alertEl.textContent = 'Preencha todos os campos.';
                    alertEl.className = 'alert alert-error mb-5';
                    return;
                }

                btn.textContent = 'Criando conta...';
                btn.disabled = true;

                try {
                    const response = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`
                        },
                        body: JSON.stringify({ name, email, password, role })
                    });

                    const result = await response.json();

                    if (result.success) {
                        window.location.href = 'confirm.html';
                    } else {
                        alertEl.textContent = result.error || 'Erro ao criar conta.';
                        alertEl.className = 'alert alert-error mb-5';
                        btn.textContent = 'Criar Conta';
                        btn.disabled = false;
                    }
                } catch (_) {
                    alertEl.textContent = 'Não foi possível conectar ao servidor.';
                    alertEl.className = 'alert alert-error mb-5';
                    btn.textContent = 'Criar Conta';
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>

</html>
